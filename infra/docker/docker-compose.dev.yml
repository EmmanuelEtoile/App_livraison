# Environnement de développement local — à lancer une fois Docker disponible :
#   docker compose -f infra/docker/docker-compose.dev.yml up -d
services:
  postgres:
    image: postgis/postgis:16-3.4      # PostgreSQL 16 + PostGIS 3.4
    container_name: livrapp-postgres
    environment:
      POSTGRES_DB: livrapp
      POSTGRES_USER: livrapp
      POSTGRES_PASSWORD: livrapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livrapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: livrapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
