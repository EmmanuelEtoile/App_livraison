spring:
  application:
    name: livrapp-api
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://localhost:5432/livrapp
    username: ${DB_USER:livrapp}
    password: ${DB_PASSWORD:livrapp}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate          # Flyway est seul maître du schéma ; Hibernate ne fait que valider
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
    org.flywaydb: info

app:
  jwt:
    secret: ${JWT_SECRET:remplace-moi-par-une-cle-d-au-moins-32-caracteres}
    expiration-ms: 86400000
  superadmin:
    email: ${SUPERADMIN_EMAIL:admin@livrapp.cm}
    phone: ${SUPERADMIN_PHONE:+237600000000}
    password: ${SUPERADMIN_PASSWORD:ChangeMoi2026!}
    first-name: ${SUPERADMIN_FIRST_NAME:Super}
    last-name: ${SUPERADMIN_LAST_NAME:Admin}
  mail:
    from: ${MAIL_FROM:no-reply@livrapp.cm}
    enabled: ${MAIL_ENABLED:false}